.sec{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem;transition:.3s;position:relative;overflow:hidden}

table{width:100%;border-collapse:collapse;font-size:.72rem}
th{text-align:left;color:var(--dim);font-weight:500;padding:3px 4px;border-bottom:1px solid var(--border);white-space:nowrap}

.cnt{text-align:center;color:var(--dim);font-size:.7rem;padding:.3rem;background:rgba(255,255,255,.02);border-radius:6px;margin-top:.4rem}

.sec-be::before{background:linear-gradient(90deg,var(--be),#ec4899)}.sec-be h2 .badge{background:#831843;color:var(--be)}
.sec-ac::before{background:linear-gradient(90deg,var(--ac),#6366f1)}.sec-ac h2 .badge{background:#312e81;color:var(--ac)}
.sec-v::before{background:linear-gradient(90deg,var(--v),#14b8a6)}.sec-v h2 .badge{background:#134e4a;color:var(--v)}

footer{text-align:center;color:var(--dim);font-size:.7rem;padding:2rem 0 1rem;border-top:1px solid var(--border);margin-top:2rem}

// Stats
const totalParams=SECTIONS.reduce((s,sec)=>s+sec.params.length,0);
const reqParams=SECTIONS.reduce((s,sec)=>s+sec.params.filter(p=>p.req).length,0);
const sEl=document.getElementById('stats');
[
 {v:SECTIONS.length,l:'様式数(セクション)',c:'#818cf8'},
 {v:totalParams,l:'入力パラメータ総数',c:'#f472b6'},
 {v:reqParams,l:'必須項目(★)',c:'#f87171'},
 {v:totalParams-reqParams,l:'任意項目',c:'#64748b'},
 {v:'18',l:'JSON定義数',c:'#2dd4bf'},
].forEach(s=>{
  const d=document.createElement('div');d.className='stat';
  d.innerHTML=`<div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div>`;
  sEl.appendChild(d);
});

// Legend
const cats=[{id:'bl',n:'建物基本',c:'#94a3b8'},{id:'be',n:'外皮(BE)',c:'#f472b6'},{id:'ac',n:'空調(AC)',c:'#818cf8'},
  {id:'v',n:'換気(V)',c:'#2dd4bf'},{id:'l',n:'照明(L)',c:'#fbbf24'},{id:'hw',n:'給湯(HW)',c:'#fb923c'},
  {id:'ev',n:'昇降機(EV)',c:'#4ade80'},{id:'pv',n:'太陽光(PV)',c:'#38bdf8'},{id:'cg',n:'コージェネ(CG)',c:'#a78bfa'}];
const lgEl=document.getElementById('legend');
cats.forEach(c=>{
  const s=document.createElement('span');s.textContent=c.n;s.style.color=c.c;s.style.background=c.c+'18';
  s.className='active';
  s.onclick=()=>{s.classList.toggle('active');
    document.querySelectorAll(`.sec-${c.id}`).forEach(el=>el.style.display=s.classList.contains('active')?'':'none');
  };
  lgEl.appendChild(s);
});

// Grid
const grid=document.getElementById('grid');
const classMap={bl:'bl',rm:'bl',be1:'be',be2:'be',be3:'be',be4:'be',ac1:'ac',ac2:'ac',ac3:'ac',ac4:'ac',v1:'v',v2:'v',l:'l',hw1:'hw',hw2:'hw',ev:'ev',pv:'pv',cg:'cg'};
SECTIONS.forEach(sec=>{
  const cls=classMap[sec.id]||'bl';
  const div=document.createElement('section');div.className=`sec sec-${cls}`;
  let h=`<h2><span class="badge">${sec.impact}</span>${sec.name}<span class="form-id">${sec.form}</span></h2>`;
  h+=`<table><tr><th>ID</th><th>パラメータ名</th><th>型/値例</th></tr>`;
  sec.params.forEach(p=>{
    h+=`<tr><td>${p.id} ${p.req?'<span class="req">★必須</span>':'<span class="opt">任意</span>'}</td>
    <td>${p.name}</td><td><span class="val">${p.ex}</span> <span style="color:#475569">${p.type}</span></td></tr>`;
  });
  h+=`</table><div class="cnt">${sec.params.length} 項目（必須 ${sec.params.filter(p=>p.req).length}）</div>`;
  div.innerHTML=h;grid.appendChild(div);
});
